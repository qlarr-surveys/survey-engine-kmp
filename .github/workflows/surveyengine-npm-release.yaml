name: release surveyengine (npm)
on:
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Assemble npm package
        run: ./gradlew clean :surveyengine:assembleNpmPackage

      - name: Publish to npm
        run: npm publish --access public
        working-directory: surveyengine/build/npmPackage
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
